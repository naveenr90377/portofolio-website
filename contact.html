<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Young+Serif&display=swap" rel="stylesheet">
</head>

<body>

<div class="contact-form">
<div class="container">

    <div class="section-one">
        <h1 class="section-one__name">Naveen.R</h1>
        <p class="section-one__role">Web Developer</p>
        <a class="section-one__contact" href="index.html">Home</a>
    </div>

    <form>
        <table>
            <tr>
                <td>Name:</td>
                <td>
                    <input type="text" placeholder="Enter your name" required class="contact-form__input">
                </td>
            </tr>

            <tr>
                <td>Email:</td>
                <td>
                    <input type="email" placeholder="Enter your email" required class="contact-form__input">
                </td>
            </tr>

            <tr>
                <td>Message:</td>
                <td>
                    <textarea placeholder="Message" class="contact-form__textarea"></textarea>
                </td>
            </tr>

            <tr>
                <td></td>
                <td>
                    <input type="submit" value="Send" class="contact-form__submit">
                </td>
            </tr>
        </table>
    </form>

    <div class="section-five">
        <p class="section-five__title">
            Social Media:
            <a href="https://www.instagram.com" target="_blank">Instagram</a>
              <a href="https://www.linkedin.com/in/naveen-r-a85617278/">LinkedIn</a>
        </p>

        <p class="section-five__desc">&copy; Naveen</p>
    </div>

</div>
</div>

</body>
</html>
